services:
  mariadb:
    image: mariadb:11
    ports:
      - "3306:3306"
    environment:
      MARIADB_ROOT_PASSWORD: root_secret
      MARIADB_DATABASE: spark_db
      MARIADB_USER: spark
      MARIADB_PASSWORD: spark_secret
    volumes:
      - mariadb-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - spark-net

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: "3001"
      DB_HOST: mariadb
      DB_PORT: "3306"
      DB_USER: spark
      DB_PASSWORD: spark_secret
      DB_NAME: spark_db
      CORS_ORIGIN: http://localhost:3000
    depends_on:
      mariadb:
        condition: service_healthy
    networks:
      - spark-net

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "3000:3000"
    environment:
      BACKEND_URL: http://api:3001
    depends_on:
      - api
    networks:
      - spark-net

networks:
  spark-net:
    driver: bridge

volumes:
  mariadb-data:
